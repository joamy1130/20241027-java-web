<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LOL - 회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main2.css">
    <style>
        /* 이미지의 보라색 버튼 느낌을 위해 추가 */
        .btn-register {
            background-color: #9146FF;
            border: none;
            color: white;
        }
        .btn-register:hover {
            background-color: #772ce8;
            color: white;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <img src="/images/LOL.webp" alt="" width="30" height="24" class="me-2">
            <button class="btn border-0 text-white" id="themeToggleBtn" onclick="toggleTheme()">🌙DARK</button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="/">리그홈</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">뉴스</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">챔피언</a></li>
                    <li class="nav-item"><a class="nav-link" href="/login">로그인</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero d-flex align-items-center justify-content-center text-center py-5">
        <div class="container" style="max-width: 480px;">
            <h2 class="fw-bold mb-4">회원가입</h2>

            <form id="registerForm" action="/register_check" method="post">
                <div class="mb-3 text-start">
                    <label class="form-label">아이디 *</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="4~20자 영문/숫자" required>
                    <div class="invalid-feedback" id="usernameMsg"></div>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label">패스워드 *</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="8자 이상, 영문+숫자+특수문자" required>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label">패스워드 확인 *</label>
                    <input type="password" class="form-control" id="passwordConfirm" placeholder="패스워드 재입력" required>
                    <div class="invalid-feedback" id="passwordMsg"></div>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label">이메일 *</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="example@email.com" required>
                    <div class="invalid-feedback" id="emailMsg"></div>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label">연락처 *</label>
                    <input type="text" class="form-control" id="phone" name="phone" placeholder="010-0000-0000" required>
                    <div class="invalid-feedback" id="phoneMsg"></div>
                </div>

                <input type="hidden" id="hashedPassword" name="password_hidden">

                <button type="button" class="btn btn-register w-100 mt-3" onclick="validateAndShowModal()">
                    회원가입
                </button>
            </form>
        </div>
    </section>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script>
        // 버튼 클릭 시 실행될 함수 (임시)
        function validateAndShowModal() {
            const form = document.getElementById('registerForm');
            if (form.checkValidity()) {
                alert("회원가입 로직을 실행합니다!");
                form.submit();
            } else {
                form.reportValidity();
            }
        }
    </script>
    <script src="js/input_check.js"></script>
    <script src="js/input_sha256.js"></script>
</body>
</html>
